# ===========================
# MySQL Database Configuration
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/capstone?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# JWT Configuration
# ===========================
jwt.secret=1234567890123456789012345678901234567890123456789012345678901234
jwt.expiration=86400000

# ===========================
# Swagger Configuration
# ===========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===========================
# Logging
# ===========================
logging.level.root=INFO
logging.level.com.hexaware.carrer=DEBUG
logging.level.org.springframework.security=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n